<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="INFORMIX Spa - Proxmox VE Management Portal. Create your portal account.">
  <title>INFORMIX Portal - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3.0">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">
        <img src="assets/logo.png" alt="INFORMIX Spa">
        <h1>INFORMIX Portal</h1>
        <p id="authSubtitle" data-i18n="register_subtitle">Create your portal account to continue</p>
      </div>

      <form id="registerForm" autocomplete="on">
        <div class="form-group">
          <label for="registerFullName" data-i18n="full_name">Full name</label>
          <input type="text" id="registerFullName" name="registerFullName" placeholder="Mario Rossi">
        </div>
        <div class="form-group">
          <label for="registerUsernameLocal" data-i18n="username">Nome utente</label>
          <div class="email-domain-group">
            <input type="text" id="registerUsernameLocal" name="registerUsernameLocal" placeholder="admin" required autofocus>
            <span class="email-domain-fixed">@informix.it</span>
          </div>
        </div>
        <div class="form-group">
          <label for="registerPassword" data-i18n="password">Password</label>
          <input type="password" id="registerPassword" name="registerPassword" placeholder="********" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="registerPasswordConfirm" data-i18n="confirm_password">Confirm password</label>
          <input type="password" id="registerPasswordConfirm" name="registerPasswordConfirm" placeholder="********" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-login" id="registerBtn">
          <span data-i18n="create_account">Create Account</span>
        </button>
      </form>

      <p class="auth-switch">
        <span data-i18n="already_have_account">Already have an account?</span>
        <a href="/login.html" id="goToLoginLink" data-i18n="go_to_login">Go to login</a>
      </p>



      <p id="authHint" style="text-align:center; margin-top:20px; font-size:.72rem; color:var(--text-muted);" data-i18n="register_hint">Register the first account to enable portal access.</p>
    </div>
  </div>

  <script src="js/i18n.js?v=3.0"></script>
  <script src="js/api.js?v=3.0"></script>
  <script src="js/auth.js?v=3.0"></script>
</body>
</html>
